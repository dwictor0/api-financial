name: Deploy Pipeline (CI/CD)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  continuous-integration:
    name: Build, Lint and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar Ambiente Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.2' 
        cache: true

    - name: Baixar Dependências
      run: go mod download

    - name: Verificar Formatação (gofmt)
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Erro: O código não está formatado de acordo com o padrão gofmt!"
          gofmt -d .
          exit 1
        fi

    - name: Análise de Segurança (SAST com gosec)
      uses: securego/gosec@master
      with:
        args: ./...

    - name: Executar Testes Automatizados
      run: go test ./tests -v

  continuous-delivery:
    name: Build & Package Docker Image
    needs: continuous-integration
    runs-on: ubuntu-latest
    if: github.event_name == 'push' 

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Simulação de Build Docker de Produção
      run: |
        echo "Iniciando build da imagem de produção para a AWS..."
        echo "Comando real: docker build -t api-financial:latest ."
        echo "Imagem estruturada e pronta para o AWS ECR com sucesso!"